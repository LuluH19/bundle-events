name: CI

on:
  push:
    branches: [main, dev]
    paths:
      - "app/**"
      - "lib/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "next.config.ts"
      - "eslint.config.mjs"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "app/**"
      - "lib/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "next.config.ts"
      - "eslint.config.mjs"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 24

defaults:
  run:
    shell: bash

jobs:
  lint-commits:
    if: github.event_name == 'pull_request' && github.base_ref != 'main'
    name: Commit Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - run: npm install --no-save @commitlint/cli @commitlint/config-conventional

      - uses: wagoid/commitlint-github-action@v6
        with:
          configFile: .commitlintrc.json

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Run ESLint
        run: npm run lint

  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Run typecheck
        run: npm run typecheck

  security:
    name: NPM Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Run npm audit (critical/high only)
        run: |
          npm audit --audit-level=high --json > audit.json || true

          node <<'EOF'
          const report = require('./audit.json');
          const v = report.metadata?.vulnerabilities || {};
          console.log(v);

          if (v.critical > 0) {
            console.error("❌ Critical vulnerabilities detected");
            process.exit(1);
          }

          if (v.high > 0) {
            console.error("❌ High vulnerabilities detected");
            process.exit(1);
          }

          console.log("✅ No critical/high vulnerabilities");
          EOF

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit
          path: audit.json
          retention-days: 14

  build:
    name: Build (Next.js)
    runs-on: ubuntu-latest
    needs: [lint, typecheck, security]
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Build app
        run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: |
            .next
            !.next/cache
          retention-days: 7

  pr-summary:
    name: PR Summary
    if: github.event_name == 'pull_request'
    needs: [lint-commits, lint, typecheck, security, build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const results = {
              commits: "${{ needs.lint-commits.result }}",
              lint: "${{ needs.lint.result }}",
              typecheck: "${{ needs.typecheck.result }}",
              security: "${{ needs.security.result }}",
              build: "${{ needs.build.result }}"
            };

            const icon = r => r === "success" ? "✅" : "❌";

            const body = `
            ## CI Results

            - Commit lint: ${icon(results.commits)}
            - ESLint: ${icon(results.lint)}
            - TypeScript: ${icon(results.typecheck)}
            - Security audit: ${icon(results.security)}
            - Build: ${icon(results.build)}
            `;

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
