name: CI

on:
  push:
    branches: [main, dev]
    paths:
      - "app/**"
      - "lib/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "next.config.ts"
      - "eslint.config.mjs"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "app/**"
      - "lib/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "next.config.ts"
      - "eslint.config.mjs"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 24

defaults:
  run:
    shell: bash

jobs:
  lint-commits:
    if: github.event_name == 'pull_request' && github.base_ref != 'main'
    name: Commit Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - run: npm install --no-save @commitlint/cli @commitlint/config-conventional

      - uses: wagoid/commitlint-github-action@v6
        with:
          configFile: .commitlintrc.json

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Run ESLint
        run: npm run lint

  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Run typecheck
        run: npm run typecheck

  security:
    name: NPM Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Run npm audit (critical/high only)
        run: |
          npm audit --audit-level=high --json > audit.json || true

          node <<'EOF'
          const report = require('./audit.json');
          const v = report.metadata?.vulnerabilities || {};
          console.log(v);

          if (v.critical > 0) {
            console.error("❌ Critical vulnerabilities detected");
            process.exit(1);
          }

          if (v.high > 0) {
            console.error("❌ High vulnerabilities detected");
            process.exit(1);
          }

          console.log("✅ No critical/high vulnerabilities");
          EOF

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit
          path: audit.json
          retention-days: 14

  build:
    name: Build (Next.js)
    runs-on: ubuntu-latest
    needs: [lint, typecheck, security]
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Build app
        run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: |
            .next
            !.next/cache
          retention-days: 7

  # --- PR checklist automation (mirrors .github/PULL_REQUEST_TEMPLATE.md) ---

  title:
    name: PR title (Conventional Commits)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title || "";
            const re = /^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([\w\-./ ]+\))?!?:\s.+/;
            const ok = re.test(title);
            core.notice(`PR title: "${title}" -> ${ok ? "valid" : "invalid"}`);
            if (!ok) core.setFailed("PR title does not follow Conventional Commits");

  dev:
    name: Dev server boot (npm run dev)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Start dev server and wait for it to respond
        run: |
          npm run dev &
          PID=$!
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000 >/dev/null; then
              echo "✅ dev server responded"
              kill "$PID" 2>/dev/null || true
              exit 0
            fi
            if ! kill -0 "$PID" 2>/dev/null; then
              echo "❌ dev server exited before it was ready"
              exit 1
            fi
            sleep 2
          done
          echo "❌ dev server did not respond within timeout"
          kill "$PID" 2>/dev/null || true
          exit 1

  secrets:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for committed secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pr-summary:
    name: PR Summary
    if: always() && github.event_name == 'pull_request'
    needs: [lint-commits, lint, typecheck, security, build, title, dev, secrets]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const res = {
              commits: "${{ needs.lint-commits.result }}",
              lint: "${{ needs.lint.result }}",
              typecheck: "${{ needs.typecheck.result }}",
              security: "${{ needs.security.result }}",
              build: "${{ needs.build.result }}",
              title: "${{ needs.title.result }}",
              dev: "${{ needs.dev.result }}",
              secrets: "${{ needs.secrets.result }}",
            };
            const ok = v => v === "success";
            const icon = v => (ok(v) ? "✅" : "❌");

            // 1) Tick the deterministic checklist boxes in the PR body.
            const items = [
              { match: "Conventional Commits", pass: ok(res.title) },
              { match: "npm run dev", pass: ok(res.dev) },
              { match: "npm run build", pass: ok(res.build) },
              { match: "secret committed", pass: ok(res.secrets) },
            ];
            const pr = context.payload.pull_request;
            const body = pr.body || "";
            const boxRe = /- \[[ xX]\]/;
            const newBody = body
              .split("\n")
              .map(line => {
                const item = items.find(i => line.includes(i.match) && boxRe.test(line));
                return item ? line.replace(boxRe, item.pass ? "- [x]" : "- [ ]") : line;
              })
              .join("\n");
            if (newBody !== body) {
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                body: newBody,
              });
            }

            // 2) Post / refresh a single summary comment.
            const marker = "<!-- ci-summary -->";
            const commentBody = [
              marker,
              "## CI Results",
              "",
              `- Commit lint: ${icon(res.commits)}`,
              `- ESLint: ${icon(res.lint)}`,
              `- TypeScript: ${icon(res.typecheck)}`,
              `- Security audit: ${icon(res.security)}`,
              `- Build: ${icon(res.build)}`,
              "",
              "### Checklist",
              `- ${icon(res.title)} PR title follows Conventional Commits`,
              `- ${icon(res.dev)} \`npm run dev\` runs without errors`,
              `- ${icon(res.build)} \`npm run build\` passes with no errors`,
              `- ${icon(res.secrets)} No API key / secret committed`,
              "",
              "> Architecture and documentation items require manual review.",
            ].join("\n");

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: commentBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: commentBody,
              });
            }
